apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-cloud-cicd
  namespace: multi-cloud-cicd
  labels:
    app.kubernetes.io/name: multi-cloud-cicd
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: multi-cloud-cicd
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: multi-cloud-cicd
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multi-cloud-cicd
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: multi-cloud-cicd
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: multi-cloud-cicd
        image: ${IMAGE}
        ports:
        - containerPort: 5000
          name: http
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: tmp
        emptyDir: {}
