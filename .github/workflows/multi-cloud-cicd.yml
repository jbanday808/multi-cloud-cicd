name: Multi-Cloud CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-build-scan:
    name: Validate, Build, and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r app/requirements.txt

      - name: Run Python validation
        run: python -m compileall app scripts

      - name: Build Docker image
        run: docker build -t multi-cloud-cicd:${{ github.sha }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: multi-cloud-cicd:${{ github.sha }}
          format: table
          output: trivy-image-scan.txt
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-scan
          path: trivy-image-scan.txt
          if-no-files-found: error
