name: Multi-Cloud CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  validate-build-scan:
    name: Validate, Build, and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r app/requirements.txt

      - name: Run Python validation
        run: python -m compileall app scripts

      - name: Build Docker image
        run: docker build -t multi-cloud-cicd:${{ github.sha }} -t multi-cloud-cicd:latest .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: multi-cloud-cicd:${{ github.sha }}
          format: table
          output: trivy-image-scan.txt
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Configure AWS credentials with OIDC
        if: ${{ github.event_name == 'push' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ github.event_name == 'push' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to Amazon ECR
        if: ${{ github.event_name == 'push' }}
        run: |
          docker tag multi-cloud-cicd:${{ github.sha }} ${{ vars.AWS_ECR_REPOSITORY_URL }}:${{ github.sha }}
          docker push ${{ vars.AWS_ECR_REPOSITORY_URL }}:${{ github.sha }}

      - name: Login to Azure with OIDC
        if: ${{ github.event_name == 'push' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        if: ${{ github.event_name == 'push' }}
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Push image to Azure ACR
        if: ${{ github.event_name == 'push' }}
        run: |
          docker tag multi-cloud-cicd:${{ github.sha }} ${{ vars.AZURE_ACR_LOGIN_SERVER }}/multi-cloud-cicd:${{ github.sha }}
          docker tag multi-cloud-cicd:${{ github.sha }} ${{ vars.AZURE_ACR_LOGIN_SERVER }}/multi-cloud-cicd:latest
          docker push ${{ vars.AZURE_ACR_LOGIN_SERVER }}/multi-cloud-cicd:${{ github.sha }}
          docker push ${{ vars.AZURE_ACR_LOGIN_SERVER }}/multi-cloud-cicd:latest

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-scan
          path: trivy-image-scan.txt
          if-no-files-found: error
